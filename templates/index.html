<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SMS Spam Classifier</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; /* Dark slate */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #8b5cf6; /* Vibrant purple */
            --primary-hover: #7c3aed;
            --spam-color: #ef4444; /* Red */
            --ham-color: #10b981; /* Green */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.15), transparent 25%);
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Subtle glow effect behind panel */
        .glass-panel::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255,255,255,0.0) 0%,
                rgba(255,255,255,0.0) 40%,
                rgba(255,255,255,0.05) 50%,
                rgba(255,255,255,0.0) 60%,
                rgba(255,255,255,0.0) 100%
            );
            transform: rotate(30deg);
            animation: shine 8s infinite linear;
            pointer-events: none;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1rem;
            color: var(--text-main);
            font-size: 1.1rem;
            resize: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        textarea::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Result Section */
        .result-container {
            margin-top: 2rem;
            display: none;
            text-align: center;
            animation: slideUp 0.5s ease-out forwards;
        }

        .result-badge {
            display: inline-block;
            padding: 0.5rem 2rem;
            border-radius: 9999px;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge-spam {
            background: rgba(239, 68, 68, 0.1);
            color: var(--spam-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .badge-ham {
            background: rgba(16, 185, 129, 0.1);
            color: var(--ham-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .confidence {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* Loader */
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes shine {
            0% { transform: translateX(-150%) rotate(30deg); }
            100% { transform: translateX(150%) rotate(30deg); }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="glass-panel">
            <div class="header">
                <h1>AI Spam Detector</h1>
                <p>Natural Language Processing with Naive Bayes</p>
            </div>

            <div class="input-group">
                <textarea id="messageInput" placeholder="Paste an SMS or email message here... (e.g. 'WINNER! Claim your free prize now!')"></textarea>
            </div>

            <button class="btn" id="analyzeBtn" onclick="analyzeText()">
                <span id="btnText">Analyze Message</span>
                <div class="loader" id="loader"></div>
            </button>

            <div class="result-container" id="resultContainer">
                <div class="result-badge" id="resultBadge">Result</div>
                <p class="confidence">Confidence: <span id="confidenceScore">0%</span></p>
            </div>
        </div>
    </div>

    <script>
        async function analyzeText() {
            const message = document.getElementById('messageInput').value;
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const resultContainer = document.getElementById('resultContainer');
            const resultBadge = document.getElementById('resultBadge');
            const confidenceScore = document.getElementById('confidenceScore');

            if (!message.trim()) {
                alert("Please enter a message to analyze.");
                return;
            }

            // Show Loading State
            btnText.style.display = 'none';
            loader.style.display = 'block';
            analyzeBtn.disabled = true;
            resultContainer.style.display = 'none';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                if (response.ok) {
                    // Update UI with Result
                    resultContainer.style.display = 'block';
                    
                    if (data.prediction === 'Spam') {
                        resultBadge.textContent = 'Spam Detected';
                        resultBadge.className = 'result-badge badge-spam';
                    } else {
                        resultBadge.textContent = 'Safe (Not Spam)';
                        resultBadge.className = 'result-badge badge-ham';
                    }

                    confidenceScore.textContent = data.confidence;
                } else {
                    alert(data.error || "An error occurred.");
                }

            } catch (error) {
                console.error("Error:", error);
                alert("Failed to connect to the server.");
            } finally {
                // Restore Button State
                btnText.style.display = 'block';
                loader.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
